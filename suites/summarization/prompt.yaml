name: summarization-v1
provider: together
model: meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
system: "You are a helpful assistant that summarizes text clearly and concisely."
user: |
  Summarize the following text in 2–3 sentences. Plain prose, no bullet points.

  TEXT:
  {{text}}
max_tokens: 256
temperature: 0.0
